name: check-pass
'on':
  pull_request:
    types:
    - labeled
    - unlabeled
    - assigned
    - unassigned
    - opened
    - synchronize
jobs:
  checkPass:
    runs-on: ubuntu-latest
    steps:
    - name: Check labels
      uses: docker://agilepathway/pull-request-label-checker:v1.0.104
      with:
        one_of: e2e-run
        none_of: failed
        repo_token: ${{secrets.TAO_PTO}}
